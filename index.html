<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Shree Balaji Restaurant - Digital Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Loader -->
    <div id="loader" class="loader">
        <div class="pulsing-circle"></div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="app hidden">
        <header class="app-header">
            <div class="header-content">
                <div class="brand-info">
                    <h1 class="brand-name">Shree Balaji <span>Cafe</span></h1>
                    <p class="brand-sub">Rooftop Dining Experience</p>
                </div>
                <!-- ID Fix: tableBadge added here -->
                <div class="table-badge" id="tableBadge">Table 4</div>
            </div>
            <div class="search-container">
                <input autocomplete="off" id="search" type="search" placeholder="Search for your favorite dish..." />
            </div>
        </header>

        <div class="nav-section">
            <nav class="categories" id="categories"></nav>
        </div>

        <main class="menu-section">
            <div id="menu-grid" class="menu-list"></div>
        </main>

        <!-- ID Fixes: floatingCart, cartItemCount, and cartTotalAmt added here -->
        <div class="floating-cart" id="floatingCart">
            <div class="cart-info">
                <span class="cart-items" id="cartItemCount">0 Items</span>
                <span class="cart-total" id="cartTotalAmt">₹0</span>
            </div>
            <button class="view-cart-btn" onclick="showCart()">View Order →</button>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <!-- ID Fix: cartModalContent added here -->
        <div class="modal-content" id="cartModalContent">
            <div class="modal-header">
                <h2>Your Order</h2>
                <button onclick="closeCart()" style="font-size:1.8rem; background:none; border:none; cursor:pointer; color: #666;">&times;</button>
            </div>
            <div id="cartItems"></div>
            <!-- ID Fix: cartFooter added here -->
            <div id="cartFooter" style="padding:20px; border-top:2px solid #eee; background: white;">
                <div style="display:flex; justify-content:space-between; font-size:1.2rem; font-weight:800; margin-bottom:15px; color: var(--text-main);">
                    <span>Total</span>
                    <span id="modalTotal">₹0</span>
                </div>
                <button onclick="placeOrder()" style="width:100%; padding:16px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:1.1rem; font-weight:700; cursor: pointer; box-shadow: 0 8px 20px var(--primary-glow);">
                    Place Order to Kitchen
                </button>
            </div>
        </div>
    </div>

    <!-- Customer Details Modal (Smart Memory) -->
    <div id="customerModal" class="modal" style="align-items: center; justify-content: center;">
        <div class="modal-content" style="max-width: 90%; width: 400px; border-radius: 20px; padding: 25px; text-align: center; max-height: max-content;">
            <h2 style="font-size: 1.6rem; margin-bottom: 10px; color: var(--text-main);">Welcome! ✨</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem;">Please enter your details once for a VIP dining experience.</p>
            
            <input type="text" id="custName" placeholder="Your Good Name" style="width: 100%; padding: 14px; margin-bottom: 15px; border: 1.5px solid #eee; border-radius: 12px; font-family: inherit; font-size: 1rem; outline: none;">
            
            <input type="tel" id="custPhone" placeholder="Phone Number" style="width: 100%; padding: 14px; margin-bottom: 25px; border: 1.5px solid #eee; border-radius: 12px; font-family: inherit; font-size: 1rem; outline: none;">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="closeCustomerModal()" style="flex: 1; padding: 14px; border: none; background: #F3F4F6; color: var(--text-muted); border-radius: 12px; font-weight: 700; cursor: pointer;">Cancel</button>
                <button onclick="saveAndProceedOrder()" style="flex: 2; padding: 14px; border: none; background: var(--primary); color: white; border-radius: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px var(--primary-glow);">Confirm & Order</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
